# fly.toml — monitor-service API
# `fly launch` will fill in `app = "<your-unique-name>"` on first run.
primary_region = "gru" # São Paulo (matches the Neon DB region)

[build]

[http_service]
  internal_port = 3000
  force_https = true
  # Scale to zero when idle to stay within the free allowance; an HTTP request
  # (dashboard poll or the GitHub Actions cron hitting /checks/run) wakes it.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[deploy]
  # Apply pending Prisma migrations before each release goes live.
  release_command = "npx prisma migrate deploy"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
